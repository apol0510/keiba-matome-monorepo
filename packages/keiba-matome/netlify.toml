[build]
  command = "npm install && npm run build --workspace=packages/keiba-matome"
  publish = "packages/keiba-matome/dist"

[functions]
  directory = "packages/keiba-matome/netlify/functions"
  external_node_modules = ["airtable"]
  node_bundler = "esbuild"

[functions."entry"]
  timeout = 60

# 静的ファイルのキャッシュ（1年間）
[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 静的記事ページのキャッシュ（CDNで1日、stale-while-revalidateで7日）
[[headers]]
  for = "/news/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800"

# HTMLのキャッシュ（1時間、CDNで1日）
[[headers]]
  for = "/keiba-yosou/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# netlify.appドメインから独自ドメインへリダイレクト（SEO対策）
[[redirects]]
  from = "/*"
  to = "https://keiba-matome.jp/:splat"
  status = 301
  force = true
  conditions = { Host = ["keiba-matome.netlify.app"] }

# 不正Slugの処理はSSR側（[slug].astro）で410 Goneを返す
# netlify.tomlのワイルドカードは正常記事を巻き込むため削除

# 存在しないエンドポイントに410を返す（GSC 404対策）
[[redirects]]
  from = "/api/contact"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/news/"
  to = "/"
  status = 301
  force = true
