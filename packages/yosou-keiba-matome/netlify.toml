[build]
  command = "npm run build --workspace=packages/yosou-keiba-matome"
  publish = "packages/yosou-keiba-matome/dist"

[functions]
  directory = "packages/yosou-keiba-matome/netlify/functions"

# 静的ファイルのキャッシュ（1年間）
[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTMLのキャッシュ（1時間、CDNで1日）
[[headers]]
  for = "/keiba-yosou/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400, stale-while-revalidate=604800"
    
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# netlify.appドメインから独自ドメインへリダイレクト（SEO対策）
[[redirects]]
  from = "/*"
  to = "https://yosou.keiba-matome.jp/:splat"
  status = 301
  force = true
  conditions = { Host = ["yosou-keiba-matome.netlify.app"] }

# 不正Slugの処理はSSR側（[slug].astro）で410/404を返す
# netlify.tomlのワイルドカードは正常記事を巻き込むため削除
